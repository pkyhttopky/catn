<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>User Live - LiveKit</title>
    <script src="https://github.com/livekit/client-sdk-js/releases/download/v1.15.3/livekit-client.browser.js"></script>
    <style>
        :root { --accent: #00d2ff; --danger: #ff4757; }
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; display: none; }
        .setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; }
        .btn-request { background: var(--accent); color: #000; border: none; padding: 18px 40px; border-radius: 40px; font-weight: 800; font-size: 16px; margin-top: 20px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #chat-box { position: absolute; bottom: 40px; left: 15px; width: 280px; max-height: 30vh; display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        .msg { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 10px; border-radius: 12px; font-size: 13px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>
    <div id="setup" class="setup-screen">
        <h2>Live System</h2>
        <p id="setup-msg">Connecting to Render...</p>
        <button id="req-btn" class="btn-request" onclick="sendRequest()" style="display:none;">REQUEST TO GO LIVE</button>
    </div>

    <video id="localVideo" autoplay muted playsinline></video>
    
    <div id="live-overlay" class="overlay">
        <div style="position:absolute; top:20px; left:15px; background:var(--danger); padding:5px 12px; border-radius:5px; font-weight:bold; font-size:12px;">LIVE | <span id="v-count">0</span> Viewers</div>
        <div id="chat-box"></div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://live-stream-server-jgxe.onrender.com');

        socket.on('connect', () => {
            document.getElementById('setup-msg').innerText = "Connected to Server.";
            document.getElementById('req-btn').style.display = "block";
            socket.emit('user-online');
        });

        function sendRequest() {
            socket.emit('user-request-live');
            document.getElementById('req-btn').innerText = "WAITING FOR APPROVAL...";
            document.getElementById('req-btn').disabled = true;
        }

        socket.on('live-approved', async (data) => {
            document.getElementById('setup').style.display = "none";
            document.getElementById('localVideo').style.display = "block";
            document.getElementById('live-overlay').style.display = "block";

            const room = new LivekitClient.Room();
            await room.connect(data.url, data.userToken);
            await room.localParticipant.enableCameraAndMicrophone();
            
            const videoElement = document.getElementById('localVideo');
            const track = room.localParticipant.getTrack(LivekitClient.Track.Source.Camera);
            if (track) track.videoTrack.attach(videoElement);
        });

        socket.on('new-comment', (d) => {
            const m = document.createElement('div'); m.className = 'msg';
            m.innerHTML = `<b style="color:var(--accent)">${d.name}</b> ${d.text}`;
            document.getElementById('chat-box').appendChild(m);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        socket.on('update-views', (c) => document.getElementById('v-count').innerText = c);
    </script>
</body>
</html>
