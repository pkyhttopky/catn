<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>User Live</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #00d2ff; --danger: #ff4757; }
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }
        .setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 100; text-align: center; }
        .btn-request { background: var(--accent); color: #000; border: none; padding: 18px 45px; border-radius: 40px; font-weight: 800; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        .top-bar { position: absolute; top: env(safe-area-inset-top, 20px); left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .live-badge { background: var(--danger); padding: 5px 12px; border-radius: 6px; font-weight: bold; font-size: 11px; }
        #chat-box { position: absolute; bottom: 40px; left: 15px; width: calc(100% - 30px); max-height: 35vh; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 12px; border-radius: 15px; font-size: 13px; border-left: 3px solid var(--accent); width: fit-content; max-width: 80%; }
    </style>
</head>
<body>
    <video id="localVideo" autoplay muted playsinline webkit-playsinline></video>
    <div id="setup" class="setup-screen">
        <h2>Broadcast Ready</h2>
        <button id="req-btn" class="btn-request" onclick="requestLive()" style="display:none;">GO LIVE</button>
    </div>
    <div id="live-overlay" class="overlay">
        <div class="top-bar">
            <div style="display:flex; gap:8px;"><div class="live-badge">LIVE</div><div style="background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:5px; font-size:11px;"><span id="v-count">0</span> Viewers</div></div>
            <button onclick="location.reload()" style="background:none; color:white; border:1px solid white; border-radius:8px; padding:6px 15px; font-size:11px;">END</button>
        </div>
        <div id="chat-box"></div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const RAILWAY_URL = 'catn.up.railway.app';
        const socket = io(`https://${RAILWAY_URL}`);
        const peer = new Peer('user-main-stream', { host: RAILWAY_URL, port: 443, path: '/peerjs/myapp', secure: true });
        let localStream = null;

        async function startCam() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
        }

        socket.on('connect', () => {
            document.getElementById('req-btn').style.display = "block";
            socket.emit('user-online');
        });

        function requestLive() {
            socket.emit('user-request-live');
            document.getElementById('req-btn').innerText = "WAITING...";
        }

        socket.on('live-approved', (adminPeerId) => {
            document.getElementById('setup').style.display = "none";
            document.getElementById('live-overlay').style.display = "block";
            peer.call(adminPeerId, localStream);
        });

        socket.on('new-comment', (d) => {
            const m = document.createElement('div'); m.className = 'msg';
            m.innerHTML = `<b style="color:var(--accent)">${d.name}:</b> ${d.text}`;
            document.getElementById('chat-box').appendChild(m);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        socket.on('update-views', (c) => document.getElementById('v-count').innerText = c);
        startCam();
    </script>
</body>
</html>
