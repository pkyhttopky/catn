<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>User Broadcast</title>
    <!-- Use UMD version for better browser support without bundlers -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <style>
        :root { --accent: #00d2ff; --danger: #ff4757; }
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; background: #111; }
        .setup-overlay { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 100; pointer-events: none; }
        .btn-request { background: var(--accent); color: #000; border: none; padding: 15px 35px; border-radius: 30px; font-weight: 800; font-size: 14px; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .live-tag { position: absolute; top: 20px; left: 20px; background: var(--danger); padding: 5px 12px; border-radius: 4px; font-weight: bold; display: none; }
        #chat-box { position: absolute; bottom: 100px; left: 15px; width: 280px; max-height: 30vh; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .msg { background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 12px; font-size: 13px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <video id="localVideo" autoplay muted playsinline></video>
    
    <div id="setup" class="setup-overlay">
        <p id="msg" style="margin-bottom:10px; font-size:12px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Connecting...</p>
        <button id="req-btn" class="btn-request" onclick="requestLive()" style="display:none;">GO LIVE</button>
    </div>

    <div id="live-tag" class="live-tag">LIVE</div>
    <div id="chat-box"></div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://live-stream-server-jgxe.onrender.com');
        let localVideoTrack = null;
        let currentRoom = null;

        // 1. Show Camera Preview immediately
        async function initCamera() {
            try {
                // Manually create track to ensure it works on mobile
                localVideoTrack = await LivekitClient.createLocalVideoTrack({ facingMode: "user" });
                localVideoTrack.attach(document.getElementById('localVideo'));
                document.getElementById('msg').innerText = "Camera ready. Waiting for server...";
            } catch (e) {
                document.getElementById('msg').innerText = "Camera Error: " + e.message;
            }
        }

        socket.on('connect', () => {
            document.getElementById('msg').innerText = "Connected to Server.";
            document.getElementById('req-btn').style.display = "block";
            socket.emit('user-online');
        });

        function requestLive() {
            socket.emit('user-request-live');
            document.getElementById('req-btn').innerText = "WAITING FOR ADMIN...";
            document.getElementById('req-btn').disabled = true;
        }

        socket.on('live-approved', async (data) => {
            document.getElementById('setup').style.display = "none";
            document.getElementById('live-tag').style.display = "block";

            currentRoom = new LivekitClient.Room();
            await currentRoom.connect(data.url, data.userToken);
            
            // Publish the track we already created
            await currentRoom.localParticipant.publishTrack(localVideoTrack);
            await currentRoom.localParticipant.setMicrophoneEnabled(true);
        });

        socket.on('new-comment', (d) => {
            const m = document.createElement('div'); m.className = 'msg';
            m.innerHTML = `<b>${d.name}:</b> ${d.text}`;
            document.getElementById('chat-box').appendChild(m);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        initCamera();
    </script>
</body>
</html>
