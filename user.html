<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>User Broadcast</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <style>
        :root { --accent: #00d2ff; --danger: #ff4757; }
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }
        .setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 100; text-align: center; }
        .btn-request { background: var(--accent); color: #000; border: none; padding: 18px 45px; border-radius: 40px; font-weight: 800; font-size: 16px; margin-top: 20px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #chat-box { position: absolute; bottom: 40px; left: 15px; width: calc(100% - 30px); max-height: 35vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 10px; border-radius: 12px; font-size: 13px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <div id="setup" class="setup-screen">
        <h2 id="setup-title">System Ready</h2>
        <p id="setup-msg" style="color:#888">Connecting...</p>
        <button id="req-btn" class="btn-request" onclick="requestLive()" style="display:none;">REQUEST TO GO LIVE</button>
    </div>

    <video id="localVideo" autoplay muted playsinline></video>
    
    <div id="live-overlay" class="overlay">
        <div style="position:absolute; top:20px; left:15px; background:var(--danger); padding:5px 12px; border-radius:5px; font-weight:bold; font-size:11px;">LIVE</div>
        <div id="chat-box"></div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://live-stream-server-jgxe.onrender.com');
        let localVideoTrack = null;

        async function initCamera() {
            try {
                localVideoTrack = await LivekitClient.createLocalVideoTrack({ facingMode: "user" });
                localVideoTrack.attach(document.getElementById('localVideo'));
                document.getElementById('setup-msg').innerText = "Camera Active.";
            } catch (e) { alert("Camera Error: " + e.message); }
        }

        socket.on('connect', () => {
            document.getElementById('req-btn').style.display = "block";
            socket.emit('user-online');
        });

        function requestLive() {
            socket.emit('user-request-live');
            document.getElementById('req-btn').innerText = "PENDING...";
        }

        socket.on('live-approved', async (data) => {
            try {
                const room = new LivekitClient.Room();
                await room.connect(data.url, data.userToken);
                
                document.getElementById('setup').style.display = "none";
                document.getElementById('live-overlay').style.display = "block";

                await room.localParticipant.publishTrack(localVideoTrack);
                await room.localParticipant.setMicrophoneEnabled(true);
                console.log("Joined LiveKit Room Successfully");
            } catch (e) { alert("LiveKit Connection Failed: " + e.message); }
        });

        socket.on('new-comment', (d) => {
            const m = document.createElement('div'); m.className = 'msg';
            m.innerHTML = `<b>${d.name}:</b> ${d.text}`;
            document.getElementById('chat-box').appendChild(m);
        });

        initCamera();
    </script>
</body>
</html>
