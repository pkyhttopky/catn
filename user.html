<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>User Live - Secure</title>
    <style>
        :root { --accent: #00d2ff; --danger: #ff4757; --glass: rgba(255, 255, 255, 0.15); }
        body { margin: 0; background: #000; font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #myVideo { width: 100%; height: 100%; object-fit: cover; background: #111; display: none; }
        .setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; }
        .btn-request { background: var(--accent); color: #000; border: none; padding: 18px 40px; border-radius: 40px; font-weight: 800; font-size: 16px; margin-top: 20px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        .top-bar { position: absolute; top: env(safe-area-inset-top, 20px); left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .live-badge { background: var(--danger); padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; animation: blink 1.5s infinite; }
        #chat-box { position: absolute; bottom: 40px; left: 15px; width: 280px; max-height: 30vh; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: var(--glass); backdrop-filter: blur(10px); padding: 10px; border-radius: 12px; font-size: 13px; border-left: 3px solid var(--accent); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="setup" class="setup-screen">
        <h2 id="setup-title">System Ready</h2>
        <p id="setup-msg">Connecting...</p>
        <button id="req-btn" class="btn-request" onclick="sendRequest()" style="display:none;">REQUEST TO GO LIVE</button>
    </div>

    <video id="myVideo" autoplay muted playsinline webkit-playsinline></video>
    
    <div id="live-overlay" class="overlay">
        <div class="top-bar">
            <div style="display:flex; gap:8px;"><div class="live-badge">LIVE</div><div style="background:rgba(0,0,0,0.5); padding:5px; border-radius:5px; font-size:11px;"><span id="v-count">0</span> Viewers</div></div>
            <button onclick="location.reload()" style="background:none; color:white; border:1px solid white; border-radius:5px; padding:5px 10px;">END</button>
        </div>
        <div id="chat-box"></div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://live-stream-server-jgxe.onrender.com');
        const peer = new Peer('user-live-stream-123');
        let localStream = null;

        socket.on('connect', () => {
            document.getElementById('setup-msg').innerText = "Connected to Server.";
            document.getElementById('req-btn').style.display = "block";
            socket.emit('user-online');
        });

        function sendRequest() {
            socket.emit('user-request-live');
            document.getElementById('req-btn').disabled = true;
            document.getElementById('setup-msg').innerText = "Waiting for Admin...";
        }

        // Answering the call
        peer.on('call', (call) => {
            call.answer(localStream);
        });

        socket.on('live-approved', async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                
                document.getElementById('setup').style.display = "none";
                document.getElementById('myVideo').style.display = "block";
                document.getElementById('live-overlay').style.display = "block";
                
                const videoElement = document.getElementById('myVideo');
                videoElement.srcObject = localStream;
                
                // CRITICAL: Tell Admin the camera is now READY
                socket.emit('user-camera-ready');
                
            } catch (err) {
                alert("Camera Error: " + err.message);
            }
        });

        socket.on('new-comment', (d) => {
            const m = document.createElement('div'); m.className = 'msg';
            m.innerHTML = `<b style="color:var(--accent)">${d.name}</b> ${d.text}`;
            document.getElementById('chat-box').appendChild(m);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        socket.on('update-views', (c) => document.getElementById('v-count').innerText = c);
    </script>
</body>
</html>
