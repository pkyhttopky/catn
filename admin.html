<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --accent: #007bff; --success: #2ed573; --warning: #ffa502; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .status-header { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        .monitor-area { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        
        #approve-panel { position: absolute; z-index: 100; background: rgba(0,0,0,0.95); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #444; display: none; }
        .btn-approve { background: var(--success); color: #000; border: none; padding: 15px 35px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .control-bar { background: #1a1a1a; padding: 15px 15px calc(15px + env(safe-area-inset-bottom, 0px)); }
        .input-box { display: flex; background: #2a2a2a; border-radius: 25px; padding: 5px 15px; align-items: center; margin-bottom: 10px; }
        input { background: transparent; border: none; color: white; flex: 1; padding: 10px; font-size: 16px; outline: none; }
        .btn-p { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

    <header class="status-header">
        <div><span id="dot" class="status-dot" style="background:#888"></span>Status: <b id="status-txt">Offline</b></div>
        <div style="font-size: 11px; color: #555;">LiveKit Cloud</div>
    </header>

    <div class="monitor-area">
        <div id="approve-panel">
            <h3>Request Received</h3>
            <button class="btn-approve" onclick="approve()">APPROVE & MONITOR</button>
        </div>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <footer class="control-bar">
        <div class="input-box">
            <input type="text" id="msg" placeholder="Type a comment...">
            <button onclick="send(true)" style="background:var(--accent); border:none; color:white; border-radius:50%; width:35px; height:35px;">></button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-p" onclick="send(true)" style="background:#333; color:white">NEW NAME</button>
            <button id="sticky" class="btn-p" onclick="send(false)" style="background:var(--success); color:black; display:none;">STAY: <span id="s-name"></span></button>
        </div>
    </footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://live-stream-server-jgxe.onrender.com');
        let lastUser = "";
        const names = ["James_W", "Saman_94", "Emma_V", "Arjun_K", "Chloe_S", "Ryan_88", "Mila_B", "Chris_D"];

        socket.on('status-update', (status) => {
            document.getElementById('status-txt').innerText = status;
            const dot = document.getElementById('dot');
            const panel = document.getElementById('approve-panel');
            if(status.includes("Online")) dot.style.background = "#2ed573";
            else if(status.includes("Requesting")) { dot.style.background = "#ffa502"; panel.style.display = "block"; }
            else if(status.includes("Broadcasting")) dot.style.background = "#00d2ff";
            else { dot.style.background = "#888"; panel.style.display = "none"; }
        });

        function approve() {
            socket.emit('admin-approve-live');
            document.getElementById('approve-panel').style.display = "none";
        }

        socket.on('live-approved', async (data) => {
            const room = new LivekitClient.Room();
            room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                if (track.kind === 'video') track.attach(document.getElementById('remoteVideo'));
            });
            await room.connect(data.url, data.adminToken);
        });

        function send(isNew) {
            const inp = document.getElementById('msg');
            if(!inp.value.trim()) return;
            if(isNew || !lastUser) lastUser = names[Math.floor(Math.random() * names.length)];
            socket.emit('send-comment', { name: lastUser, text: inp.value });
            document.getElementById('s-name').innerText = lastUser;
            document.getElementById('sticky').style.display = "block";
            inp.value = '';
        }
    </script>
</body>
</html>
