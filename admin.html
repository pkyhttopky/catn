<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .monitor { flex: 1; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #overlay { position: absolute; z-index: 100; background: rgba(0,0,0,0.85); padding: 30px; border-radius: 20px; text-align: center; display: none; }
        .btn-approve { background: #2ed573; color: #000; border: none; padding: 15px 35px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .controls { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; background: #2a2a2a; border: none; color: white; padding: 12px; border-radius: 8px; outline: none; }
    </style>
</head>
<body>
    <div id="status" style="padding:10px; font-size:12px; background:#111; border-bottom:1px solid #333;">User Status: Offline</div>
    
    <div class="monitor">
        <div id="overlay">
            <h3 style="margin-top:0">Live Request!</h3>
            <button class="btn-approve" onclick="approve()">APPROVE & VIEW</button>
        </div>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="controls">
        <input type="text" id="msg" placeholder="Type as anonymous...">
        <button onclick="send()" style="background:#007bff; border:none; color:white; padding:0 20px; border-radius:8px;">SEND</button>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://live-stream-server-jgxe.onrender.com');
        let currentRoom = null;

        socket.on('status-update', (s) => {
            document.getElementById('status').innerText = "User Status: " + s;
            if(s.includes("Requesting")) document.getElementById('overlay').style.display = "block";
        });

        function approve() {
            socket.emit('admin-approve-live');
            document.getElementById('overlay').style.display = "none";
        }

        socket.on('live-approved', async (data) => {
            currentRoom = new LivekitClient.Room();
            
            // Listen for the video track to arrive
            currentRoom.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                if (track.kind === 'video') {
                    track.attach(document.getElementById('remoteVideo'));
                }
            });

            await currentRoom.connect(data.url, data.adminToken);
        });

        function send() {
            const inp = document.getElementById('msg');
            if(!inp.value.trim()) return;
            socket.emit('send-comment', { name: "Viewer_" + Math.floor(Math.random()*100), text: inp.value });
            inp.value = '';
        }
    </script>
</body>
</html>
